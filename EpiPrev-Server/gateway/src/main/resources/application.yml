server:
  # 网关服务端口
  port: 8080

spring:
  application:
    # 当前应用名称（注册到 Nacos 的服务名）
    name: gateway
  config:
    # 引入公共配置（Redis、Nacos 等）
    import:
      - classpath:cache.yml
      - classpath:config.yml
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              # 开启基于服务发现的路由（可以通过服务名 lb://xxx 转发）
              enabled: true
              lower-case-service-id: true
          routes:
            # 认证中心路由
            - id: auth
              uri: lb://auth
              predicates:
                - Path=/auth/**
            # 用户服务路由
            - id: business-user
              uri: lb://business-user
              predicates:
                - Path=/user/**
            # 文章服务路由
            - id: business-article
              uri: lb://business-article
              predicates:
                - Path=/article/**
            # 论坛服务SENTINEL_GROUP路由
            - id: business-forum
              uri: lb://business-forum
              predicates:
                - Path=/forum/**
            # 管理后台服务
            - id: admin
              uri: lb://admin
              predicates:
                - Path=/admin/**
            # 健康分析模块
            - id: business-health
              uri: lb://business-health
              predicates:
                - Path=/health/**
            # 新闻资讯模块
            - id: business-news
              uri: lb://business-news
              predicates:
                - Path=/news/**
    sentinel:
      transport:
        dashboard: 47.99.39.81:8858 # Sentinel 控制台地址，用于监控和交互
        client-ip: ke5c3c6b.natappfree.cc
        port: 8719
      # 建议开启启动时立即注册
      eager: true
      datasource: # 规则数据源
        flow:
          nacos:
            # Nacos 的地址（通常是 8848）
            server-addr: 47.99.39.81:8848
            data-id: epiprev-gateway-flow-rules # nacos 中的配置文件名
            group-id: SENTINEL_GROUP
            rule-type: gw-flow # 网关限流：gw-flow 普通限流 flow 熔断降级 degrade
            data-type: json # nacos 里存储的是Json
