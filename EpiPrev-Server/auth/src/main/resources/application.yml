server:
  port: 9000
spring:
  application:
    name: auth
  config:
    import:
      - classpath:cache.yml
      - classpath:config.yml
      - classpath:rpc.yml
############## Sa-Token 配置 ##############
sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: true
